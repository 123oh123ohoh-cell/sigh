<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - OwnsHub</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .chat-container {
      max-width: 900px;
      margin: 40px auto;
      display: flex;
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.22);
      background: var(--card-bg, #232323);
      min-height: 500px;
      overflow: hidden;
    }
    .user-list {
      width: 260px;
      border-right: 1.5px solid #333;
      background: #181818;
      padding: 0;
      margin: 0;
      list-style: none;
      overflow-y: auto;
      min-height: 500px;
    }
    .user-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid #232323;
      color: #eee;
      transition: background 0.18s, color 0.18s;
      font-size: 1.05em;
      min-height: 56px;
      position: relative;
    }
    .user-list li.active, .user-list li:hover {
      background: #232323;
      color: #ffb347;
    }
    .user-list .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: #444;
      border: 2px solid #333;
      flex-shrink: 0;
    }
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chat-header {
      padding: 18px 24px;
      border-bottom: 1.5px solid #333;
      font-size: 1.18em;
      color: #ffb347;
      font-weight: 600;
      background: #1a1a1a;
      letter-spacing: 0.5px;
    }
    .messages-area {
      flex: 1;
      padding: 24px 18px;
      overflow-y: auto;
      background: #232323;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .message.me {
      align-items: flex-end;
    }
    .message .bubble {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 18px;
      background: #ffb347;
      color: #181818;
      font-weight: 500;
      max-width: 70vw;
      word-break: break-word;
      font-size: 1.05em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
    .message.me .bubble {
      background: linear-gradient(90deg,#ffb347 0%,#ff416c 100%);
      color: #fff;
    }
    .message .meta {
      font-size: 0.85em;
      color: #bbb;
      margin-top: 2px;
      margin-bottom: 4px;
    }
    .chat-input-area {
      display: flex;
      padding: 16px 20px;
      border-top: 1.5px solid #333;
      background: #181818;
      gap: 10px;
    }
    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #292929;
      color: #fff;
      font-size: 1em;
      outline: none;
    }
    .chat-input-area button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg,#ffb347 0%,#ff416c 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.18s;
    }
    .chat-input-area button:hover {
      background: linear-gradient(90deg,#ff416c 0%,#ffb347 100%);
    }
    @media (max-width: 700px) {
      .chat-container {
        flex-direction: column;
        min-width: 0;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
      }
      .user-list {
        width: 100vw;
        min-height: 0;
        max-height: 120px;
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        border-right: none;
        border-bottom: 1.5px solid #333;
      }
      .user-list li {
        flex-direction: column;
        align-items: center;
        min-width: 80px;
        border-bottom: none;
        border-right: 1px solid #232323;
        padding: 10px 6px;
        font-size: 0.98em;
      }
      .chat-header, .chat-input-area {
        padding-left: 10px;
        padding-right: 10px;
      }
      .messages-area {
        padding: 14px 6px;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation Bar -->
  <header class="header" style="margin-bottom:0;">
    <a href="index.html" class="logo"><img src="logo2.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px;">own's hub</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="arts.html" class="nav-link">Arts</a>
      <a href="#" class="nav-link" id="logoutBtn">Log Out</a>
    </nav>
  </header>
  <div class="chat-container">
    <div style="display:flex;flex-direction:column;width:260px;background:#181818;border-right:1.5px solid #333;">
      <input id="userSearchInput" type="text" placeholder="Type @ to search users..." style="margin:12px 12px 0 12px;padding:8px 12px;border-radius:8px;border:none;background:#232323;color:#fff;font-size:1em;outline:none;">
        <script>
          // Log out logic
          document.addEventListener('DOMContentLoaded', function() {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
              logoutBtn.onclick = function(e) {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('loggedInUser');
                window.location.href = 'login.html';
              };
            }
          });
        </script>
      <div style="padding:10px 12px 0 12px;">
        <select id="statusSelect" style="width:100%;padding:6px 10px;border-radius:8px;background:#232323;color:#fff;border:none;font-size:1em;">
          <option value="online">🟢 Online</option>
          <option value="dnd">⛔ Do Not Disturb</option>
          <option value="away">🌙 Away</option>
          <option value="offline">⚫ Offline</option>
        </select>
      </div>
      <ul class="user-list" id="userList" style="flex:1 1 auto;"></ul>
    </div>
    <div class="chat-main">
      <div class="chat-header" id="chatHeader">Messages</div>
      <div class="messages-area" id="messagesArea">
        <div id="chatWelcome" style="display:flex;flex:1;align-items:center;justify-content:center;flex-direction:column;color:var(--text-gray);font-size:1.2em;min-height:300px;">
          <img src="logo2.png" alt="OwnsHub Logo" style="width:80px;height:80px;opacity:0.7;margin-bottom:18px;">
          <div>Welcome to OwnsHub Chat</div>
          <div style="font-size:0.95em;margin-top:8px;">Select a user to start chatting!</div>
        </div>
      </div>
      <div class="chat-input-area" id="chatInputArea" style="display:none;">
        <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="chat.js"></script>
  <script>
    // Hide input area and show welcome by default
    document.getElementById('chatInputArea').style.display = 'none';
    document.getElementById('chatWelcome').style.display = 'flex';
    // When a user is selected, chat.js should hide welcome and show input area
    window.showChatInput = function() {
      document.getElementById('chatInputArea').style.display = 'flex';
      document.getElementById('chatWelcome').style.display = 'none';
    };
    window.showChatWelcome = function() {
      document.getElementById('chatInputArea').style.display = 'none';
      document.getElementById('chatWelcome').style.display = 'flex';
      document.getElementById('messagesArea').innerHTML = document.getElementById('chatWelcome').outerHTML;
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - own's hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="icon" type="image/png" href="logo2.png">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">🔥 own's hub</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="login.html" class="nav-link" id="loginNav">Login</a>
            <a href="signup.html" class="nav-link" id="signupNav">Create Account</a>
            <a href="profile.html" class="nav-link" id="profileNav">Profile</a>
            <a href="signout.html" class="nav-link" id="signoutNav">Sign Out</a>
            <script>
            // Responsive nav links for login state
            document.addEventListener('DOMContentLoaded', function() {
                const loggedInUser = localStorage.getItem('loggedInUser');
                const loginNav = document.getElementById('loginNav');
                const signupNav = document.getElementById('signupNav');
                const profileNav = document.getElementById('profileNav');
                const signoutNav = document.getElementById('signoutNav');
                if (loggedInUser) {
                    if (loginNav) loginNav.style.display = 'none';
                    if (signupNav) signupNav.style.display = 'none';
                    if (profileNav) profileNav.style.display = '';
                    if (signoutNav) signoutNav.style.display = '';
                } else {
                    if (loginNav) loginNav.style.display = '';
                    if (signupNav) signupNav.style.display = '';
                    if (profileNav) profileNav.style.display = 'none';
                    if (signoutNav) signoutNav.style.display = 'none';
                }
            });
            </script>
        </nav>
    </header>
    <main class="profile-main">
        <div class="profile-container">
            <h2>Your Profile</h2>
            <div id="profileInfo"></div>
            <div id="profileSavedMsg" style="display:none;color:green;margin-top:12px;font-weight:bold;"></div>
            <div id="profileSummary" class="profile-summary"></div>
            <form id="profileForm" class="profile-form" enctype="multipart/form-data">
                <label>Profile Picture
                    <input type="file" id="profilePic" accept="image/*">
                </label>
                <img id="avatarPreview" class="profile-avatar" src="" alt="Profile Picture" style="display:none;" />
                <label>Display Name
                    <input type="text" id="displayName" maxlength="32">
                </label>
                <label>Pronouns
                    <select id="pronouns">
                        <option value="">Select pronouns</option>
                        <option value="he/him">he/him</option>
                        <option value="she/her">she/her</option>
                        <option value="they/them">they/them</option>
                        <option value="custom">Custom</option>
                    </select>
                </label>
                <input type="text" id="customPronouns" placeholder="Enter custom pronouns" style="display:none;">
                <label>Bio
                    <textarea id="bio" maxlength="200" rows="3"></textarea>
                </label>
                <button type="submit">Save Profile</button>
            </form>
        </div>
    </main>
    <script src="profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Art - own's hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="logo2.png">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo"><img src="logo2.png" alt="Logo" style="height:32px;vertical-align:middle;margin-right:8px;">own's hub</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="arts.html" class="nav-link">Arts</a>
        </nav>
    </header>
    <main class="art-view-page" style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div id="artViewContainer" style="background:#222;padding:32px 24px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.12);max-width:600px;width:100%;text-align:center;">
            <img id="artViewImage" src="" alt="Art" style="max-width:100%;max-height:400px;border-radius:12px;background:#333;">
            <h2 id="artViewTitle" style="color:#ffb347;margin-top:18px;"></h2>
            <div id="artViewAuthor" style="color:#bbb;margin:8px 0 12px 0;"></div>
            <div id="artViewDesc" style="color:#eee;margin-bottom:12px;"></div>
            <div id="artViewDate" style="color:#888;font-size:0.95em;"></div>
            <div id="artDeleteBtnContainer"></div>
        </div>
    </main>
    <script src="art-view.js"></script>
</body>
</html>
